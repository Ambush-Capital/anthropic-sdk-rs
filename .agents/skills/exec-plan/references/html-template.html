<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  {{GOOGLE_FONTS_LINK}}
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>

  <!-- Base styles (theme-independent layout and component structure) -->
  <style>
    /* ===== Reset and base layout ===== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
      line-height: 1.6;
    }

    body {
      display: flex;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #e0e0e0;
      background: #0a0a0a;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      height: auto;
    }

    /* ===== Sidebar layout ===== */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 100;
      width: 260px;
      height: 100vh;
      overflow-y: auto;
      padding: 1.5rem 1rem;
      background: #111111;
      border-right: 1px solid #222222;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      transition: transform 0.3s ease;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid #222222;
    }

    .theme-badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-radius: 4px;
      background: #222222;
      color: #999999;
      border: 1px solid #333333;
    }

    .sidebar-links {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .sidebar-links a {
      display: block;
      padding: 0.45rem 0.75rem;
      font-size: 0.85rem;
      border-radius: 6px;
      color: #aaaaaa;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .sidebar-links a:hover {
      background: #1a1a1a;
      color: #ffffff;
    }

    .sidebar-links a.active {
      background: #1a1a1a;
      color: #ffffff;
      font-weight: 600;
    }

    /* ===== Sidebar toggle button ===== */
    .sidebar-toggle {
      display: none;
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 200;
      width: 44px;
      height: 44px;
      border: 1px solid #333333;
      border-radius: 8px;
      background: #111111;
      color: #e0e0e0;
      font-size: 1.4rem;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease;
      line-height: 1;
      padding: 0;
    }

    .sidebar-toggle:hover {
      background: #1a1a1a;
    }

    /* ===== Main content area ===== */
    .container {
      flex: 1;
      margin-left: 260px;
      padding: 2.5rem 3rem;
      max-width: 960px;
      width: 100%;
    }

    .container header {
      margin-bottom: 2.5rem;
    }

    .container header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1.25rem;
      font-size: 0.8rem;
      color: #777777;
    }

    .theme-label {
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      background: #1a1a1a;
      border: 1px solid #222222;
    }

    .updated-label {
      font-style: italic;
    }

    .container section {
      margin-bottom: 2.5rem;
    }

    .container h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid #222222;
    }

    .container h3 {
      font-size: 1.15rem;
      font-weight: 600;
      margin-top: 1.25rem;
      margin-bottom: 0.6rem;
    }

    .container h4 {
      font-size: 1rem;
      font-weight: 600;
      margin-top: 1rem;
      margin-bottom: 0.4rem;
    }

    .container p {
      margin-bottom: 0.75rem;
    }

    .container ul,
    .container ol {
      margin-bottom: 0.75rem;
      padding-left: 1.5rem;
    }

    .container li {
      margin-bottom: 0.35rem;
    }

    .container blockquote {
      margin: 1rem 0;
      padding: 0.75rem 1rem;
      border-left: 3px solid #333333;
      background: #111111;
      border-radius: 0 6px 6px 0;
      font-style: italic;
      color: #aaaaaa;
    }

    .container code {
      font-family: "Fira Code", "Cascadia Code", "JetBrains Mono", "Source Code Pro", Consolas, monospace;
      font-size: 0.85em;
      padding: 0.15em 0.35em;
      border-radius: 4px;
      background: #1a1a1a;
      border: 1px solid #222222;
    }

    .container pre {
      margin: 1rem 0;
      padding: 1rem;
      border-radius: 8px;
      background: #111111;
      border: 1px solid #222222;
      overflow-x: auto;
    }

    .container pre code {
      padding: 0;
      background: none;
      border: none;
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .container hr {
      margin: 2rem 0;
      border: none;
      border-top: 1px solid #222222;
    }

    /* ===== Phase card component ===== */
    .phase-card {
      margin: 1.25rem 0;
      padding: 1.25rem 1.5rem;
      border-radius: 10px;
      background: #111111;
      border: 1px solid #222222;
      transition: border-color 0.2s ease;
    }

    .phase-card:hover {
      border-color: #333333;
    }

    .phase-card h3 {
      margin-top: 0;
      margin-bottom: 0.75rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
    }

    .phase-card p {
      font-size: 0.92rem;
      margin-bottom: 0.5rem;
    }

    .phase-card p:last-child {
      margin-bottom: 0;
    }

    /* ===== Risk badges ===== */
    .badge-risk-low {
      display: inline-block;
      padding: 0.15rem 0.55rem;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-radius: 4px;
      background: #0d3b1e;
      color: #34d058;
      border: 1px solid #1a5c30;
    }

    .badge-risk-medium {
      display: inline-block;
      padding: 0.15rem 0.55rem;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-radius: 4px;
      background: #3b2e0d;
      color: #e3b341;
      border: 1px solid #5c4a1a;
    }

    .badge-risk-high {
      display: inline-block;
      padding: 0.15rem 0.55rem;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-radius: 4px;
      background: #3b0d0d;
      color: #f85149;
      border: 1px solid #5c1a1a;
    }

    /* ===== Complexity badges (1-5 graded blue to red) ===== */
    .badge-complexity-1 {
      display: inline-block;
      padding: 0.15rem 0.55rem;
      font-size: 0.7rem;
      font-weight: 700;
      border-radius: 4px;
      background: #0d2b3b;
      color: #58a6ff;
      border: 1px solid #1a3f5c;
    }

    .badge-complexity-2 {
      display: inline-block;
      padding: 0.15rem 0.55rem;
      font-size: 0.7rem;
      font-weight: 700;
      border-radius: 4px;
      background: #0d333b;
      color: #3bc9db;
      border: 1px solid #1a4f5c;
    }

    .badge-complexity-3 {
      display: inline-block;
      padding: 0.15rem 0.55rem;
      font-size: 0.7rem;
      font-weight: 700;
      border-radius: 4px;
      background: #2e3b0d;
      color: #d4e157;
      border: 1px solid #4a5c1a;
    }

    .badge-complexity-4 {
      display: inline-block;
      padding: 0.15rem 0.55rem;
      font-size: 0.7rem;
      font-weight: 700;
      border-radius: 4px;
      background: #3b2e0d;
      color: #ffb74d;
      border: 1px solid #5c4a1a;
    }

    .badge-complexity-5 {
      display: inline-block;
      padding: 0.15rem 0.55rem;
      font-size: 0.7rem;
      font-weight: 700;
      border-radius: 4px;
      background: #3b0d0d;
      color: #f85149;
      border: 1px solid #5c1a1a;
    }

    /* ===== Progress bar component ===== */
    .progress-bar {
      width: 100%;
      height: 12px;
      background: #1a1a1a;
      border: 1px solid #222222;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }

    .progress-fill {
      height: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, #238636, #2ea043);
      transition: width 0.4s ease;
    }

    .progress-label {
      font-size: 0.82rem;
      color: #777777;
      margin-bottom: 1rem;
    }

    /* ===== Checklist ===== */
    .checklist {
      list-style: none;
      padding-left: 0;
      margin-bottom: 1rem;
    }

    .checklist li {
      padding: 0.4rem 0.6rem;
      margin-bottom: 0.25rem;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: background 0.15s ease;
    }

    .checklist li:hover {
      background: #111111;
    }

    .checklist li.done {
      color: #777777;
      text-decoration: line-through;
      text-decoration-color: #444444;
    }

    /* ===== Collapsible sections (details/summary) ===== */
    details {
      border: 1px solid #222222;
      border-radius: 10px;
      background: #0e0e0e;
      overflow: hidden;
    }

    details[open] {
      border-color: #333333;
    }

    .collapsible-header {
      cursor: pointer;
      padding: 1rem 1.25rem;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: background 0.2s ease;
      user-select: none;
    }

    .collapsible-header:hover {
      background: #151515;
    }

    .collapsible-header::-webkit-details-marker {
      display: none;
    }

    .collapsible-header::before {
      content: "\25B6";
      display: inline-block;
      font-size: 0.65rem;
      transition: transform 0.2s ease;
      color: #555555;
      flex-shrink: 0;
    }

    details[open] > .collapsible-header::before {
      transform: rotate(90deg);
    }

    .collapsible-header h2 {
      font-size: 1.3rem;
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }

    .collapsible-content {
      padding: 0.75rem 1.25rem 1.25rem 1.25rem;
      border-top: 1px solid #222222;
    }

    .collapsible-content ul {
      padding-left: 1.25rem;
    }

    .collapsible-content li {
      margin-bottom: 0.75rem;
      line-height: 1.6;
    }

    /* ===== Summary table ===== */
    .summary-table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0 1.5rem 0;
      font-size: 0.88rem;
    }

    .summary-table thead th {
      text-align: left;
      padding: 0.65rem 0.8rem;
      background: #151515;
      border-bottom: 2px solid #333333;
      font-weight: 700;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #999999;
    }

    .summary-table tbody td {
      padding: 0.55rem 0.8rem;
      border-bottom: 1px solid #1a1a1a;
      vertical-align: top;
    }

    .summary-table tbody tr:nth-child(even) {
      background: #0e0e0e;
    }

    .summary-table tbody tr:hover {
      background: #151515;
    }

    /* ===== Mermaid diagram container ===== */
    .mermaid {
      display: flex;
      justify-content: center;
      margin: 1.5rem auto;
      max-width: 100%;
      overflow-x: auto;
      padding: 1rem;
      background: #111111;
      border: 1px solid #222222;
      border-radius: 10px;
    }

    .mermaid svg {
      max-width: 100%;
      height: auto;
    }

    /* ===== Responsive breakpoints ===== */
    @media (max-width: 1024px) {
      .container {
        padding: 2rem 2rem;
      }
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        width: 280px;
        box-shadow: none;
      }

      .sidebar.open {
        transform: translateX(0);
        box-shadow: 4px 0 24px rgba(0, 0, 0, 0.5);
      }

      .sidebar-toggle {
        display: flex;
      }

      .container {
        margin-left: 0;
        padding: 4.5rem 1.25rem 2rem 1.25rem;
        max-width: 100%;
      }

      .container header h1 {
        font-size: 1.6rem;
      }

      .meta {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }

      .phase-card {
        padding: 1rem;
      }

      .summary-table {
        font-size: 0.78rem;
      }

      .summary-table thead th,
      .summary-table tbody td {
        padding: 0.4rem 0.5rem;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 4rem 1rem 1.5rem 1rem;
      }

      .container header h1 {
        font-size: 1.35rem;
      }

      .summary-table {
        display: block;
        overflow-x: auto;
        white-space: nowrap;
      }
    }

    /* ===== Print styles ===== */
    @media print {
      body {
        display: block;
        background: #ffffff;
        color: #000000;
        font-size: 11pt;
      }

      .sidebar {
        display: none;
      }

      .sidebar-toggle {
        display: none;
      }

      .container {
        margin-left: 0;
        padding: 0;
        max-width: 100%;
      }

      .container header h1 {
        color: #000000;
        font-size: 22pt;
      }

      .meta {
        color: #555555;
      }

      .theme-label {
        background: none;
        border: 1px solid #cccccc;
        color: #555555;
      }

      .theme-badge {
        background: none;
        border: 1px solid #cccccc;
        color: #555555;
      }

      .phase-card {
        background: #ffffff;
        border: 1px solid #cccccc;
        page-break-inside: avoid;
      }

      details {
        background: #ffffff;
        border: 1px solid #cccccc;
      }

      .collapsible-header {
        background: none;
      }

      .collapsible-content {
        border-top: 1px solid #cccccc;
      }

      .summary-table thead th {
        background: #f0f0f0;
        color: #000000;
        border-bottom: 2px solid #999999;
      }

      .summary-table tbody td {
        border-bottom: 1px solid #dddddd;
        color: #000000;
      }

      .summary-table tbody tr:nth-child(even) {
        background: #f9f9f9;
      }

      .progress-bar {
        background: #eeeeee;
        border: 1px solid #cccccc;
      }

      .progress-fill {
        background: #333333;
      }

      .progress-label {
        color: #555555;
      }

      .checklist li {
        color: #000000;
      }

      .checklist li.done {
        color: #888888;
      }

      .mermaid {
        background: #ffffff;
        border: 1px solid #cccccc;
        page-break-inside: avoid;
      }

      .container h2 {
        border-bottom: 1px solid #cccccc;
        color: #000000;
      }

      .container h3,
      .container h4 {
        color: #000000;
      }

      .container p,
      .container li {
        color: #000000;
      }

      .container blockquote {
        background: #f5f5f5;
        border-left: 3px solid #999999;
        color: #333333;
      }

      .container code {
        background: #f0f0f0;
        border: 1px solid #dddddd;
        color: #000000;
      }

      .container pre {
        background: #f5f5f5;
        border: 1px solid #dddddd;
      }

      .badge-risk-low {
        background: #e6f9ed;
        color: #1a7f37;
        border: 1px solid #1a7f37;
      }

      .badge-risk-medium {
        background: #fff8e1;
        color: #9a6700;
        border: 1px solid #9a6700;
      }

      .badge-risk-high {
        background: #ffeef0;
        color: #cf222e;
        border: 1px solid #cf222e;
      }

      .badge-complexity-1 {
        background: #ddf4ff;
        color: #0969da;
        border: 1px solid #0969da;
      }

      .badge-complexity-2 {
        background: #ddf4ff;
        color: #0e7c86;
        border: 1px solid #0e7c86;
      }

      .badge-complexity-3 {
        background: #f0ffd4;
        color: #5c6b00;
        border: 1px solid #5c6b00;
      }

      .badge-complexity-4 {
        background: #fff8e1;
        color: #9a6700;
        border: 1px solid #9a6700;
      }

      .badge-complexity-5 {
        background: #ffeef0;
        color: #cf222e;
        border: 1px solid #cf222e;
      }

      a {
        color: #000000;
        text-decoration: none;
      }

      a[href]::after {
        content: none;
      }
    }
  </style>

  <!-- Theme-specific styles (replaced by LLM from themes.md) -->
  {{THEME_CSS}}
</head>
<body>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="theme-badge">{{THEME_NAME}}</span>
    </div>
    <div class="sidebar-links">
      <!-- LLM generates TOC links from MD section headings -->
      <!-- Example: <a href="#purpose">Purpose / Big Picture</a> -->
    </div>
  </nav>

  <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle navigation">&#9776;</button>

  <main class="container">
    <header>
      <h1>{{TITLE}}</h1>
      <div class="meta">
        <span class="theme-label">Theme: {{THEME_NAME}}</span>
        <span class="updated-label">Last updated: <time>{{LAST_UPDATED}}</time></span>
      </div>
    </header>

    {{CONTENT}}

    <!--
    CONTENT STRUCTURE GUIDE FOR LLM:

    Each MD section becomes an HTML section with an id matching the heading slug.

    Progress section example:
    <section id="progress">
      <h2>Progress</h2>
      <div class="progress-bar">
        <div class="progress-fill" style="width: 40%"></div>
      </div>
      <p class="progress-label">2 of 5 steps complete</p>
      <ul class="checklist">
        <li class="done">&#x2611; (2026-02-24 14:00Z) Step one completed</li>
        <li>&#x2610; Step two pending</li>
      </ul>
    </section>

    Plan of Work section example with summary table:
    <section id="plan-of-work">
      <h2>Plan of Work</h2>
      <h3>Risk &amp; Complexity Summary</h3>
      <table class="summary-table">
        <thead>
          <tr><th>Phase</th><th>Description</th><th>Risk</th><th>Complexity</th><th>Est. LOC</th><th>Dependencies</th></tr>
        </thead>
        <tbody>
          <tr>
            <td>Phase 1</td>
            <td>Description</td>
            <td><span class="badge-risk-low">Low</span></td>
            <td><span class="badge-complexity-2">2</span></td>
            <td>~50</td>
            <td>None</td>
          </tr>
        </tbody>
      </table>

      <div class="phase-card">
        <h3>Phase 1: Title <span class="badge-risk-low">Low</span> <span class="badge-complexity-2">2</span></h3>
        <p><strong>Scope:</strong> ...</p>
        <p><strong>Dependencies:</strong> None</p>
        <p>...</p>
        <p><strong>Acceptance:</strong> ...</p>
      </div>
    </section>

    Collapsible section example (for Decision Log, Surprises, Artifacts):
    <section id="decision-log">
      <details>
        <summary class="collapsible-header"><h2>Decision Log</h2></summary>
        <div class="collapsible-content">
          <ul>
            <li><strong>Decision:</strong> ... <br><strong>Rationale:</strong> ... <br><strong>Date/Author:</strong> ...</li>
          </ul>
        </div>
      </details>
    </section>

    Mermaid diagram example:
    <div class="mermaid">
    graph TD
      A[Phase 1] &#45;&#45;&gt; B[Phase 2]
      B &#45;&#45;&gt; C[Phase 3]
    </div>
    -->
  </main>

  <script>
    // Initialize Mermaid
    mermaid.initialize({ startOnLoad: true, theme: 'dark' });

    // Sidebar toggle for mobile
    document.getElementById('sidebarToggle').addEventListener('click', function() {
      document.getElementById('sidebar').classList.toggle('open');
    });

    // Close sidebar when clicking a link on mobile
    document.querySelectorAll('.sidebar-links a').forEach(function(link) {
      link.addEventListener('click', function() {
        if (window.innerWidth < 768) {
          document.getElementById('sidebar').classList.remove('open');
        }
      });
    });

    // Smooth scrolling for sidebar links
    document.querySelectorAll('.sidebar-links a').forEach(function(anchor) {
      anchor.addEventListener('click', function(e) {
        e.preventDefault();
        var target = document.querySelector(this.getAttribute('href'));
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
    });
  </script>
</body>
</html>
